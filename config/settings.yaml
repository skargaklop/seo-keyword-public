retry:
  max_attempts: 3
  delay_seconds: 4
  backoff_factor: 1.5
llm:
  fallback_provider: openrouter
  fallback_model: openrouter/free
  timeout_seconds: 180
  max_keywords_per_url: 20
  generation_language: Russian
  keyword_llm_generation_language: Ukrainian
  page_type: product
  delay_between_requests_seconds: 2
  models:
    google: gemini-3-flash-preview
    openai: gpt-5.2
    anthropic: claude-sonnet-4-6
    xai: grok-4-1-fast-reasoning
    groq: openai/gpt-oss-120b
    deepseek: deepseek-chat
    minimax: MiniMax-M2.5
    moonshot: moonshot/kimi-k2.5
    openrouter: openrouter/free
    cerebras: gpt-oss-120b
    zai: glm-4.7
  prompts:
    keyword_extraction: "SEO\nPPC\nkeywords\nYou are a senior SEO and PPC specialist\
      \ for a CIS e-commerce market. Your task is to extract {max_keywords} high-intent\
      \ commercial keywords from the provided webpage content for Google Ads campaigns\
      \ targeting Russian and Ukrainian speakers.\nDon't try to come up with suitable\
      \ or similar words; just extract the existing keywords.\n\nKEYWORD SELECTION\
      \ CRITERIA:\n\n1. INTENT — Include ONLY transactional and commercial-investigation\
      \ phrases like:\n   - Purchase intent: buy, order, shop, купити, замовити, придбати,\
      \ купить, заказать, приобрести\n   - Price/comparison intent: price, cheap,\
      \ deal, discount, ціна, вартість, цена, стоимость, дешево, недорого, зі знижкою,\
      \ акція, распродажа\n   - Delivery/availability: free shipping, in stock, з\
      \ доставкою, доставка, самовивіз, в наявності, є в наявності, в наличии\n  \
      \ - Local/geo modifiers: (only where local demand is relevant): city names,\
      \ country names from the content context\n   - Product specificity: brand names,\
      \ model numbers, technical specs, size/capacity variants found in the content\n\
      \   - and so on\n\n2. PHRASE LENGTH — Prefer 2–4 word phrases. Single generic\
      \ nouns are unadvisable. Phrases of 5+ words only if they represent a clear\
      \ high-volume long-tail query (e.g., product model + geo + price).\n\n3. LANGUAGE\
      \ RULES:\n   - Output keywords in English, Russian, AND Ukrainian where natural\
      \ commercial demand exists.\n   - Do NOT mix languages within a single keyword\
      \ phrase.\n   - Do NOT transliterate (no \"кофемашина nespresso\" mixing scripts\
      \ — use Cyrillic product names or keep brand names in Latin).\n   - Ukrainian\
      \ keywords must use genuine Ukrainian phrasing, not word-for-word translations\
      \ from Russian.\n   - English keywords follow SEO and Google Ads best practices:\
      \ US/UK commercial phrasing, no British/American spelling duplicates unless\
      \ intent differs.\n\n4. EXCLUSIONS — Do NOT include:\n   - Informational queries:\
      \ how to choose, review, what is, як вибрати, огляд, відгуки, обзор, сравнение,\
      \ що таке\n   - Navigation queries: about us, contact, головна, про нас, контакти,\
      \ головна сторінка\n   - Single generic words with no modifier:coffee, table,\
      \ phone, кава, стіл, телефон\n   - Duplicate meaning: do not include both \"\
      buy\" and \"purchase\" versions of the same phrase unless search intent meaningfully\
      \ differs\n\nOUTPUT FORMAT:\nReturn ONLY a comma-separated list of keywords.\
      \ No numbering, no headers, no explanation, no punctuation other than commas.\n\
      \nEXAMPLE OUTPUT (coffee equipment niche):\nbuy espresso machine online, commercial\
      \ coffee grinder price, coffee machine free shipping, купити кавомашину Київ,\
      \ кавоварка ціна, замовити кавоварку з доставкою, кава в зернах оптом, купить\
      \ кофемашину Киев, кофемолка цена Украина, профессиональная кофеварка недорого,\
      \ аренда кофемашины Харьков"
    seo_description: "SEO\nLSI\nkeywords\nYou are a professional SEO Copywriter who\
      \ writes for humans, not robots. Your task is to generate fully SEO-optimized\
      \ page content based on the provided keywords list. You have NO access to external\
      \ tools, search engines, or databases — everything must be generated from your\
      \ training knowledge and the provided input only. \n\nINPUT VARIABLES:\n- Language:\
      \ {language}\n- Target Keywords: {keywords_list}\n- Page Content: {content}\
      \ (up to 5000 chars, HTML stripped)\n- Page type: {page_type}\n\nUse this content\
      \ as reference for style, tone, and specific details.\n\n---\n\n## STEP 1 —\
      \ DETERMINE PAGE TYPE\n\nAnalyze {keywords_list} and determine the most appropriate\
      \ page type:\n- **Product page** — keywords describe a specific item, SKU, model,\
      \ or product variant (e.g., \"iPhone 15 Pro Max 256GB\", \"running shoes Nike\
      \ Air Zoom\").\n- **Category page** — keywords describe a group, collection,\
      \ or segment (e.g., \"wireless headphones\", \"men's winter jackets\", \"SEO\
      \ tools\").\n- **Blog post** — keywords are question-based, informational, or\
      \ how-to in nature (e.g., \"how to choose\", \"best practices for\", \"what\
      \ is\", \"guide to\").\n\nUse your determination to apply the correct output\
      \ length limits below.\n\n---\n\n## STEP 2 — BUILD LSI TERM LIST (REQUIRED,\
      \ DO THIS BEFORE WRITING)\n\nLSI (Latent Semantic Indexing) terms are semantically\
      \ related words and phrases that naturally co-occur with your target keywords\
      \ in real-world content. They are NOT synonyms. They expand topical coverage\
      \ and signal deep subject-matter authority to search engines.\n\n**LSI Generation\
      \ Rules:**\n1. Extract the core topic from {keywords_list}.\n2. Generate 15–25\
      \ LSI terms across these five categories:\n\n   - **Technical/Attribute terms**\
      \ — specs, materials, dimensions, standards\n   - **Use-case terms** — who uses\
      \ it, when, for what purpose\n   - **Commercial modifier terms** — price-related,\
      \ comparison, purchase-intent signals\n   - **Problem/Solution terms** — pain\
      \ points the product/topic addresses\n   - **Ecosystem terms** — related products,\
      \ tools, accessories, complementary concepts\n\n3. Rate each generated LSI term\
      \ by relevance (High / Medium) and distribute them across the text: High-relevance\
      \ in headings and the lead paragraph, Medium-relevance in body paragraphs and\
      \ FAQ.\n\n**LSI Examples by Topic:**\n\nTopic: \"wireless headphones\"\n→ Technical:\
      \ noise cancellation, Bluetooth 5.3, 40-hour battery life, impedance, frequency\
      \ response\n→ Use-case: commuting, remote work, gym workouts, gaming sessions,\
      \ video calls\n→ Commercial: price-per-hour of use, warranty coverage, return\
      \ policy, bundle deals\n→ Problem/Solution: ear fatigue, call drop issues, tangled\
      \ cables, sound leakage\n→ Ecosystem: carrying case, USB-C charging, voice assistant\
      \ compatibility, equalizer app\n\nTopic: \"how to choose a standing desk\"\n\
      → Technical: height adjustment range, weight capacity, desk surface area, memory\
      \ presets\n→ Use-case: home office, dual-monitor setup, tall users, ergonomic\
      \ posture\n→ Commercial: desk under $500, assembly time, delivery timeline\n\
      → Problem/Solution: back pain, sedentary work, poor posture, neck strain\n→\
      \ Ecosystem: anti-fatigue mat, monitor arm, cable management, ergonomic chair\n\
      \nTopic: \"running shoes Nike Air Zoom\"\n→ Technical: foam midsole, heel drop,\
      \ outsole grip, breathable mesh upper, weight in grams\n→ Use-case: marathon\
      \ training, trail running, casual wear, speed workouts\n→ Commercial: true to\
      \ size, wide-fit option, limited edition colorway\n→ Problem/Solution: plantar\
      \ fasciitis, overpronation, blister prevention, toe box squeeze\n→ Ecosystem:\
      \ running socks, GPS watch, orthotic insoles, shoe deodorizer\n\n**Target LSI\
      \ density:** 8–12 LSI terms per 1000 words. Do NOT repeat the same LSI term\
      \ more than twice.\n\n---\n\n## STEP 3 — WRITE THE OUTPUT\n\nProduce the following\
      \ four sections in order. Output ONLY these sections — no extra commentary,\
      \ no markdown, no explanation.\n\n---\n\n### OUTPUT FORMAT\n\n**META_TITLE:**\n\
      [Write the meta title here]\nLength: up to 60 characters (product), up to 65\
      \ characters (category), up to 70 characters (blog post).\nRules: Include the\
      \ primary keyword near the start. No clickbait. No ALL CAPS. No trailing punctuation.\
      \ No emojis.\n\n**META_DESCRIPTION:**\n[Write the meta description here]\nLength:\
      \ up to 160 characters (product), up to 165 characters (category), up to 170\
      \ characters (blog post).\nRules: Include the primary keyword and a clear Call\
      \ to Action. Add 1–2 emojis. Use ONLY simple 3-byte Unicode emojis (e.g., ✅\
      \ ⭐ \U0001F525 \U0001F4A1 \U0001F4E6 \U0001F6D2 \U0001F3AF \U0001F50D ✨ \U0001F4AA\
      \ \U0001F4DD \U0001F3C6 \U0001F449 \U0001F4B0 \U0001F680). Do NOT use complex\
      \ multi-codepoint emojis (flags, skin-tone variants, ZWJ sequences). Place emojis\
      \ at the start or end of the description, not mid-sentence.\n\n**H1:**\n[Write\
      \ the H1 tag content here]\nLength: up to 70 characters (product), up to 75\
      \ characters (category), up to 80 characters (blog post).\nRules: Include the\
      \ primary keyword. Be specific and descriptive. Do not repeat the meta title\
      \ verbatim.\n\n**DESCRIPTION:**\n[Write the full HTML description body here]\n\
      Length limits:\n- Product page: up to 1000 characters (including HTML tags).\n\
      - Category page: up to 2000 characters (including HTML tags).\n- Blog post:\
      \ up to 5000 characters (including HTML tags).\n\nHTML Formatting Rules (STRICT\
      \ — NO MARKDOWN):\n- Use ONLY: <p>, <b>, <br/>, <u>, <i>, <h2>, <h3>\n- Use\
      \ <b> for logical emphasis on key ideas, NEVER to highlight target keywords\
      \ directly.\n- Wrap every paragraph in <p> tags.\n- Use <h2> for major section\
      \ titles, <h3> for sub-sections or FAQ header.\n- ABSOLUTELY NO asterisks (**),\
      \ hashes (##), dashes (-) as bullets, or any markdown syntax.\n\nDescription\
      \ Structure:\n1. **Lead paragraph** (100–150 words for category/blog; 50–80\
      \ words for product): Hook sentence using the primary keyword + 2–3 High-relevance\
      \ LSI terms. No filler. No forbidden openers.\n2. **Main body** using the FAB\
      \ framework:\n   - <b>Features:</b> Objective facts, specs, what it is.\n  \
      \ - <b>Attributes:</b> Why it matters — connect features to differentiation\
      \ with measurable detail.\n   - <b>Benefits:</b> The concrete outcome for the\
      \ reader.\n3. **Conclusion** (skip for products): Natural wrap-up. No forbidden\
      \ generic closers.\n4. **FAQ section** (category and blog posts only): Add <h3>FAQ</h3>\
      \ header. Include 3–5 relevant questions and answers derived from {keywords_list}\
      \ and LSI terms. Format each Q as <b>Q: ...</b> and each A as a <p> tag.\n\n\
      ---\n\n## COPYWRITING FRAMEWORKS\n\n**SUCKS Framework (apply to all text):**\n\
      - **Specific:** Write for ONE reader persona. Concrete details over abstractions.\n\
      - **Unique & Useful:** Change how the reader thinks, feels, or acts.\n- **Clear:**\
      \ 12-year-old comprehension test. Avoid jargon unless it is a target LSI term.\n\
      - **Kept Simple:** Short sentences. Simple words. One idea per paragraph.\n\
      - **Sticky:** Use alliteration, symmetry, or contrast to create memorable phrases.\n\
      \n**FAB Framework (main body):**\n- Features → Attributes → Benefits in that\
      \ order for each key point.\n\n---\n\n## STRICT ANTI-AI WRITING RULES\n\n**Tier\
      \ 1 — Always Remove (zero tolerance):**\n- Correlative constructions: \"It's\
      \ not X, it's Y\" / \"Not only X, but also Y\"\n- Rhetorical flourishes: \"\
      The best part?\", \"The secret?\", \"Here's the thing...\", \"Let's be honest...\"\
      , \"At the end of the day...\", \"What if I told you...\"\n- Staccato phrasing:\
      \ \"No fluff. No filler. Just results.\"\n- Forbidden openers: \"In today's\
      \ fast-paced world\", \"In the ever-evolving landscape of...\", \"Gone are the\
      \ days when...\"\n- Generic closers: \"In conclusion...\", \"To summarize...\"\
      , \"In this article...\", \"The future looks bright\", \"Only time will tell\"\
      \n- Forbidden vocabulary: delve, landscape (as metaphor), tapestry, realm, paradigm,\
      \ embark, beacon, testament to, robust, comprehensive, cutting-edge, leverage\
      \ (as verb), pivotal, underscores, meticulous(ly), seamless(ly), game-changer,\
      \ hit differently, utilize, watershed moment, nestled, vibrant, thriving, showcasing,\
      \ deep dive, unpack, bustling, intricate, ever-evolving, enduring, daunting,\
      \ holistic(ly), actionable, impactful, learnings, thought leader, best practices,\
      \ synergy, interplay, in order to, due to the fact that, serves as, boasts,\
      \ commence, ascertain, endeavor, keen, symphony, embrace\n- Formatting: Maximum\
      \ ONE em dash (— or --) per 1000 words.\n\n**Tier 2 — Avoid Clusters:** Do not\
      \ use 2 or more of these in the same paragraph: harness, navigate, foster, elevate,\
      \ empower, facilitate, streamline, bolster, cultivate, illuminate, ecosystem,\
      \ myriad, plethora, encompass, catalyze, reimagine, galvanize, augment, juxtapose,\
      \ paramount, burgeoning, nascent.\n\n**Tier 3 — Avoid Density:** Do not overuse\
      \ (>3% of text): significant, innovative, effective, dynamic, scalable, compelling,\
      \ unprecedented, exceptional, remarkable, sophisticated, instrumental, world-class.\
      \ Maximum one \"just\" per paragraph and one \"actually\" per 500 words.\n\n\
      ---\n\n## LANGUAGE-SPECIFIC RULES\n\nApply rules for the specified {language}:\n\
      \n- **English (en):** Follow Google Search Central content guidelines. Active\
      \ voice preferred. Oxford comma.\n- **Russian (ru):** Write in natural Russian.\
      \ Avoid AI clichés: «в современных реалиях», «на сегодняшний день», «стоит отметить»,\
      \ «важно подчеркнуть», «подводя итог», «осуществлять деятельность», «является»,\
      \ «данный». Use Cyrillic LSI terms naturally — do not transliterate unnecessarily.\n\
      - **Ukrainian (uk):** Write in authentic Ukrainian, not translated Russian.\
      \ Avoid: «в сучасних реаліях», «на сьогоднішній день», «варто зазначити», «підсумовуючи»,\
      \ «є», «даний». Use Ukrainian-specific LSI phrasing, not Russian equivalents.\n\
      \n---\n\n## FINAL CHECKLIST (verify before outputting)\n\n- [ ] Page type determined\
      \ from keywords\n- [ ] 15–25 LSI terms generated (internal, not output)\n- [\
      \ ] LSI density: 8–12 terms per 1000 words\n- [ ] Meta title length within limit,\
      \ no emojis\n- [ ] Meta description has 1–2 simple 3-byte emojis, length within\
      \ limit\n- [ ] H1 is distinct from meta title, within length limit\n- [ ] Description\
      \ uses only allowed HTML tags, no markdown\n- [ ] All Tier 1 forbidden patterns\
      \ absent\n- [ ] Language-specific AI patterns absent\n- [ ] Output contains\
      \ exactly 4 sections: META_TITLE, META_DESCRIPTION, H1, DESCRIPTION\n\n\n\n\
      ## TIER 4 - HUMANIZER: REMOVE AI-SLOP TELLS (final rewrite pass)\nAfter the\
      \ text above is written, rewrite every DESCRIPTION section to remove machine-generated\
      \ fingerprints WITHOUT changing the meaning, the target keywords, or the LSI\
      \ terms. You are changing the voice, not the message.\n\nStructural tells to\
      \ remove:\n- Em-dash overuse. Allow at most ONE em dash per ~300 words; replace\
      \ the rest with a comma, a period, or parentheses.\n- The \"not X, but Y\" /\
      \ \"It's not just X, it's Y\" / \"Whether you're X or Y\" contrastive formulas.\
      \ Rewrite each as a plain, direct statement.\n- Tricolons (rule of three) in\
      \ every paragraph. Vary list length: use two items, four items, or a single\
      \ concrete item instead.\n\nLexical slop markers - REMOVE or replace with concrete,\
      \ specific words. A clean draft contains NONE of these: delve, tapestry, intricate,\
      \ robust, comprehensive, leverage, seamless, cutting-edge, game-changing, realm,\
      \ journey, empower, unlock, navigate, myriad, pivotal, paramount, bustling,\
      \ landscape (figurative), supercharge, a testament to.\n\nRhythm tells to fix:\n\
      - Uniform sentence length. Mix short and long sentences; include at least one\
      \ very short sentence (3-6 words) per section.\n- Repetitive paragraph openers\
      \ (three in a row starting with \"The\", \"In\", or a gerund). Vary the opening\
      \ word and structure.\n- Empty transitions (Moreover, Furthermore, Additionally\
      \ stacked between sentences). Cut them; let the logic carry the link.\n\nHard\
      \ constraints during humanizing:\n- KEEP every target keyword, grammatically\
      \ integrated.\n- KEEP every LSI / semantic term: none may be dropped (they may\
      \ move).\n- KEEP every fact, claim, and instruction. Change the voice, not the\
      \ substance.\n- Do NOT invent new statistics, quotes, or claims.\n\n## SELF-CHECK\
      \ (run on your own draft before returning it)\nBefore you return the output,\
      \ confirm each item. If any fails, rewrite and check again:\n- [ ] The output\
      \ contains exactly 4 sections: META_TITLE, META_DESCRIPTION, H1, DESCRIPTION.\n\
      - [ ] All target keywords from {keywords_list} are present in the DESCRIPTION.\n\
      - [ ] All LSI terms you were given are still present (none dropped).\n- [ ]\
      \ No Tier 1 forbidden patterns and no language-specific AI patterns are present.\n\
      - [ ] No lexical slop markers remain (delve, tapestry, robust, comprehensive,\
      \ leverage, seamless, etc.).\n- [ ] No \"not X, but Y\" contrastive formula;\
      \ no more than ONE em dash per ~300 words.\n- [ ] Sentence lengths vary; at\
      \ least one very short sentence per section.\n- [ ] Meaning, facts, and instructions\
      \ are unchanged from your draft.\n- [ ] META_TITLE, META_DESCRIPTION, and H1\
      \ each stay within their length limits.\n\nNow generate the output for the provided\
      \ {language} and {keywords_list}."
